name: Morning Report

on:
  schedule:
    - cron: '0 1 * * *' # รันตอน 8 โมงเช้าเวลาไทย
  workflow_dispatch: # อนุญาตให้กดปุ่มรันเองได้

jobs:
  run-logger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install gspread

      - name: Run sales logger script
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python sales_logger.py